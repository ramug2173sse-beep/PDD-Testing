name: Android Mobile Appium E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # Daily build

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  appium-tests:
    runs-on: macos-13 # macOS supports hardware virtualization for emulator acceleration

    steps:
      # Stage 1: Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Stage 2: Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # Stage 3 & 4: Setup Android SDK & Install Android Dependencies
      # (Handled by the macOS runner environment and gradlew caching)

      # Stage 5: Build APK
      - name: Build Android Debug APK
        run: |
          cd gsms-mobile
          chmod +x gradlew
          ./gradlew assembleDebug

      # Stage 6 & 7: Start Android Emulator & Verify Emulator Readiness
      # Stage 8: Install APK
      # Stage 9: Start Appium Server
      # Stage 10: Verify Appium Health
      # Stage 11: Execute Appium E2E Tests
      - name: Run Appium Tests in Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader -no-audio -no-boot-anim
          disable-animations: true
          script: |
            # Set up Environment path
            export ANDROID_HOME=$ANDROID_SDK_ROOT
            
            # Start Appium Server (Stage 9)
            cd gsms-mobile/appium-tests
            npm install
            npx appium driver install uiautomator2
            npx appium --log appium.log &
            
            # Verify Appium Health (Stage 10)
            npx wait-on -t 30000 http://127.0.0.1:4723/status
            
            # Verify Emulator & Install APK (Stage 7 & 8)
            adb wait-for-device
            adb install ../app/build/outputs/apk/debug/app-debug.apk
            
            # Execute Appium E2E Tests (Stage 11)
            export APPIUM_DEVICE_NAME="emulator-5554"
            export APPIUM_PLATFORM_VERSION="13"
            npm test

      # Stage 18: Upload Artifacts
      - name: Upload E2E Test Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Appium_Mobile_E2E_Report
          path: |
            gsms-mobile/appium-tests/reports/
            gsms-mobile/appium-tests/screenshots/
            gsms-mobile/appium-tests/logs/
            appium.log
          retention-days: 30

      # Stage 19 & 20: Publish Reports to GitHub Pages and Update Historical Reports
      - name: Deploy Reports to GitHub Pages
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Clone the gh-pages branch in a separate folder
          git clone --branch gh-pages https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git gh-pages-dir
          
          # Ensure target folders exist
          mkdir -p gh-pages-dir/reports/latest
          mkdir -p gh-pages-dir/reports/history/build-${{ github.run_number }}
          
          # Clean latest reports folder
          rm -rf gh-pages-dir/reports/latest/*
          
          # Copy Excel and HTML reports, summary, screenshots, and logs
          cp -r gsms-mobile/appium-tests/reports/HTML/* gh-pages-dir/reports/latest/ || true
          cp -r gsms-mobile/appium-tests/reports/Excel/* gh-pages-dir/reports/latest/ || true
          cp gsms-mobile/appium-tests/reports/JSON/execution-results.json gh-pages-dir/reports/latest/ || true
          cp gsms-mobile/appium-tests/reports/Summary/summary.md gh-pages-dir/reports/latest/ || true
          
          if [ -d gsms-mobile/appium-tests/screenshots ]; then
            cp -r gsms-mobile/appium-tests/screenshots gh-pages-dir/reports/latest/ || true
          fi
          if [ -d gsms-mobile/appium-tests/logs ]; then
            cp -r gsms-mobile/appium-tests/logs gh-pages-dir/reports/latest/ || true
          fi
          
          # Copy to history folder
          cp -r gh-pages-dir/reports/latest/* gh-pages-dir/reports/history/build-${{ github.run_number }}/ || true
          
          # Commit and Push changes back to gh-pages branch
          cd gh-pages-dir
          git add reports/
          git commit -m "chore: deploy Appium reports for build ${{ github.run_number }} [skip ci]" || true
          git push origin gh-pages || true

      # Stage 21: Publish GitHub Action Summary
      - name: Publish GitHub Action Run Summary
        if: always()
        run: |
          if [ -f gsms-mobile/appium-tests/reports/Summary/summary.md ]; then
            cat gsms-mobile/appium-tests/reports/Summary/summary.md >> $GITHUB_STEP_SUMMARY
          else
            echo "Summary file not found."
          fi
