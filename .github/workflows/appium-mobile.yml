name: Android Mobile Appium E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  appium-tests:
    runs-on: macos-13 # macOS is chosen because GitHub Actions macOS runners support native hardware virtualization for the emulator

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Step 1: Set up Java & Build Android APK
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Android Debug APK
        run: |
          cd gsms-mobile
          chmod +x gradlew
          ./gradlew assembleDebug

      # Step 2: Set up Node.js for backend & Appium tests
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            gsms-mobile/appium-tests/package-lock.json

      # Step 3: Install & Start Backend Service (Mock DB mode)
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

      - name: Start Backend Server
        run: |
          cd backend
          npm run dev &
        env:
          PORT: 4000

      # Step 4: Install Appium & Test Dependencies
      - name: Install Appium and Drivers
        run: |
          cd gsms-mobile/appium-tests
          npm install
          npx appium driver install uiautomator2

      # Step 5: Start Appium Server & Execute Tests inside Android Emulator
      - name: Run Appium Tests in Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader -no-audio -no-boot-anim
          disable-animations: true
          script: |
            # Start Appium Server in the background
            export ANDROID_HOME=$ANDROID_SDK_ROOT
            npx appium --log appium.log &
            
            # Wait for Appium REST server to become active
            npx wait-on -t 30000 http://127.0.0.1:4723/status
            
            # Run WebdriverIO E2E tests
            cd gsms-mobile/appium-tests
            export APPIUM_DEVICE_NAME="emulator-5554"
            export APPIUM_PLATFORM_VERSION="13"
            npm test

      # Step 6: Upload E2E Test Report
      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Appium_Mobile_E2E_Report
          path: |
            gsms-mobile/appium-tests/E2E_Test_Report.xlsx
            appium.log
          retention-days: 30
