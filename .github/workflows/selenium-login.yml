name: E2E Selenium Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # Step 1: Set up and start Backend API (runs on Mock DB by default in CI)
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

      - name: Start Backend Server
        run: |
          cd backend
          npm run dev &
        env:
          PORT: 4000
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gsmat_db

      # Step 2: Set up and start Frontend
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Start Frontend Server
        run: |
          cd frontend
          npm run dev &
        env:
          NODE_ENV: development

      # Step 3: Wait for both services to be online
      - name: Wait for Frontend and Backend
        run: |
          npx wait-on -t 60000 http://localhost:4000/api/auth/login || true
          npx wait-on -t 60000 http://localhost:3000/PDD-Testing/login/

      # Step 4: Run Selenium Tests
      - name: Install Selenium Test Dependencies
        run: |
          cd frontend/selenium-tests
          npm install

      - name: Run E2E Selenium Tests
        run: |
          cd frontend/selenium-tests
          npm test
        env:
          CI: true
          BASE_URL: http://localhost:3000/PDD-Testing
