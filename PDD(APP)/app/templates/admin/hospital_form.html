{% extends "base.html" %}
{% block title %}{{ action }} Hospital - Admin{% endblock %}

{% block content %}
<div class="container admin-container" style="max-width:700px">
    <div class="admin-back"><a href="{{ url_for('admin.hospitals') }}" class="btn btn-outline btn-sm">Back</a></div>
    <h1>{{ action }} Hospital</h1>
    <form method="POST" class="admin-form">
        <div class="form-group"><label>Name *</label><input type="text" name="name" class="form-control" required
                value="{{ hospital.name if hospital else '' }}"></div>
        <div class="form-group"><label>Address</label><input type="text" name="address" class="form-control"
                value="{{ hospital.address if hospital else '' }}"></div>
        <div class="form-row">
            <div class="form-group"><label>City</label><input type="text" name="city" class="form-control"
                    value="{{ hospital.city if hospital else '' }}"></div>
            <div class="form-group"><label>State</label><input type="text" name="state" class="form-control"
                    value="{{ hospital.state if hospital else '' }}"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Phone</label><input type="text" name="phone" class="form-control"
                    value="{{ hospital.phone if hospital else '' }}"></div>
            <div class="form-group"><label>Email</label><input type="email" name="email" class="form-control"
                    value="{{ hospital.email if hospital else '' }}"></div>
        </div>
        <div class="form-group"><label>Specialties (comma separated)</label><input type="text" name="specialties"
                class="form-control" value="{{ hospital.specialties if hospital else '' }}"
                placeholder="e.g. Cardiology,Neurology"></div>
        <div class="form-row">
            <div class="form-group"><label>Rating (0-5)</label><input type="number" name="rating" class="form-control"
                    step="0.1" min="0" max="5" value="{{ hospital.rating if hospital else '0' }}"></div>
            <div class="form-group form-check-group"><label class="form-check"><input type="checkbox" name="emergency"
                        {% if hospital and hospital.emergency %}checked{% endif %}><span>24/7 Emergency
                        Services</span></label></div>
        </div>
        <button type="submit" class="btn btn-primary">{{ action }} Hospital</button>
    </form>
</div>
{% endblock %}
