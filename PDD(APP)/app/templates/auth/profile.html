{% extends "base.html" %}
{% block title %}My Profile - SMAT AI{% endblock %}

{% block content %}
<div class="container" style="max-width:700px">
    <div class="page-header">
        <h1>My Profile</h1>
    </div>
    <div class="profile-page-card">
        <div class="profile-avatar-lg">{{ (user.full_name or user.username)[0].upper() }}</div>
        <form action="{{ url_for('auth.profile') }}" method="POST" class="auth-form">
            <div class="form-row">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="full_name" class="form-control" value="{{ user.full_name or '' }}">
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" class="form-control" value="{{ user.username }}" disabled>
                </div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" class="form-control" value="{{ user.email }}" disabled>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" name="age" class="form-control" value="{{ user.age or '' }}">
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <select name="gender" class="form-control form-select">
                        <option value="">Select</option>
                        {% for g in ['Male','Female','Other'] %}<option value="{{ g }}" {% if user.gender==g
                            %}selected{% endif %}>{{ g }}</option>{% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Blood Group</label>
                    <select name="blood_group" class="form-control form-select">
                        <option value="">Select</option>
                        {% for bg in ['A+','A-','B+','B-','AB+','AB-','O+','O-'] %}
                        <option value="{{ bg }}" {% if user.blood_group==bg %}selected{% endif %}>{{ bg }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" name="phone" class="form-control" value="{{ user.phone or '' }}">
            </div>
            <div class="form-group">
                <label>Address</label>
                <textarea name="address" class="form-control" rows="2">{{ user.address or '' }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary">Update Profile</button>
        </form>

        <hr class="divider">
        <h3>Change Password</h3>
        <form action="{{ url_for('auth.change_password') }}" method="POST" class="auth-form">
            <div class="form-group">
                <label>Current Password</label>
                <div class="password-wrapper">
                    <input type="password" name="current_password" class="form-control" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('cp1')"><i
                            class="fas fa-eye"></i></button>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" name="new_password" id="cp1" class="form-control" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" name="confirm_password" class="form-control" required>
                </div>
            </div>
            <button type="submit" class="btn btn-warning">Change Password</button>
        </form>
    </div>
</div>
{% endblock %}
