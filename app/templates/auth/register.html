{% extends "base.html" %}
{% block title %}Register - SMAT AI{% endblock %}

{% block content %}
<div class="auth-wrapper auth-wide">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Create Account</h1>
            <p>Join SMAT AI — your health companion</p>
        </div>
        <form method="POST" action="{{ url_for('auth.register') }}" class="auth-form" id="registerForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name" name="full_name" class="form-control"
                        value="{{ full_name or '' }}" placeholder="Your full name">
                </div>
                <div class="form-group">
                    <label for="username">Username *</label>
                    <input type="text" id="username" name="username" class="form-control" value="{{ username or '' }}"
                        placeholder="Choose a username" required minlength="3">
                </div>
            </div>
            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" name="email" class="form-control" value="{{ email or '' }}"
                    placeholder="your@email.com" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="password">Password *</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" class="form-control"
                            placeholder="Min 6 characters" required minlength="6">
                        <button type="button" class="toggle-password" onclick="togglePassword('password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength" id="strengthBar"></div>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password *</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                            placeholder="Repeat password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('confirm_password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" class="form-control" value="{{ age or '' }}"
                        placeholder="Your age" min="1" max="120">
                </div>
                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select id="gender" name="gender" class="form-control form-select">
                        <option value="">Select gender</option>
                        <option value="Male" {% if gender=='Male' %}selected{% endif %}>Male</option>
                        <option value="Female" {% if gender=='Female' %}selected{% endif %}>Female</option>
                        <option value="Other" {% if gender=='Other' %}selected{% endif %}>Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="blood_group">Blood Group</label>
                    <select id="blood_group" name="blood_group" class="form-control form-select">
                        <option value="">Select blood group</option>
                        {% for bg in ['A+', 'A-', 'B+', 'B-', 'AB+', 'AB-', 'O+', 'O-'] %}
                        <option value="{{ bg }}" {% if blood_group==bg %}selected{% endif %}>{{ bg }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" class="form-control" value="{{ phone or '' }}"
                    placeholder="+91 XXXXXXXXXX">
            </div>
            <button type="submit" class="btn btn-primary btn-full">
                Create Account
            </button>
        </form>
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}">Sign in here</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.getElementById('password').addEventListener('input', function () {
        const val = this.value;
        const bar = document.getElementById('strengthBar');
        let strength = 0;
        if (val.length >= 6) strength++;
        if (val.length >= 10) strength++;
        if (/[A-Z]/.test(val)) strength++;
        if (/[0-9]/.test(val)) strength++;
        if (/[^A-Za-z0-9]/.test(val)) strength++;
        bar.className = 'password-strength';
        if (strength <= 1) bar.classList.add('weak');
        else if (strength <= 3) bar.classList.add('medium');
        else bar.classList.add('strong');
    });
</script>
{% endblock %}
